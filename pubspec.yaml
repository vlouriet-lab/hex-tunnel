name: hex_decensor
description: A VPN tunneling app based on sing-box for Android.
version: 2.1.0+2100
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Networking — HTTP requests for key loading
  http: ^1.2.1

  # Cryptographic hashing for detached integrity checks
  crypto: ^3.0.6
  cryptography: ^2.7.0

  # State management
  provider: ^6.1.2

  # Persistent storage for settings and cached keys
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^8.1.0

  # Permissions (VPN, Internet, etc.)
  permission_handler: ^12.0.1

  # File picker for local custom sources
  file_picker: ^8.1.0

  # Icons
  cupertino_icons: ^1.0.8
  package_info_plus: ^8.0.2
  path_provider_android: ^2.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
